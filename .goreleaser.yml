# This is an example .goreleaser.yml file with some sensible defaults.
# Make sure to check the documentation at https://goreleaser.com

# The lines below are called `modelines`. See `:help modeline`
# Feel free to remove those if you don't want/need to use them.
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

before:
  hooks:
    # You may remove this if you don't use go modules.
    - go mod tidy

builds:
  - main: ./main.go
    binary: time-left
    targets:
      - linux_amd64
    ldflags:
      - -X '{{.PACKAGE}}/config.Version={{.VERSION}}'
      # - -X '{{.PACKAGE}}/config.Build={{.BUILD}}'
      # - -X '{{.PACKAGE}}/config.BuildTime={{.BUILD_TIME}}'
      # - -X '{{.PACKAGE}}/config.OS={{.TARGET_OS}}'

archives:
  - formats: "tar.gz"
    name_template: "{{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - src: "./docs/samples/config.yaml"
        dst: config.yaml

brews:
  - name: time-left
    directory: "Formula"
    repository:
      owner: "ismtabo"
      name: "time-left"
    homepage: "https://github.com/ismtabo/time-left"
    custom_block: |
      head "https://github.com/ismtabo/time-left.git", branch: "main"
    dependencies:
      - name: gtk+3
        os: linux
      - name: libayatana-appindicator
        os: linux
    service: |
      run [opt_bin, "--config", pkgetc/"config.yaml"]
    post_install: |
      pkgetc.install "config.yaml"

changelog:
  disable: true
